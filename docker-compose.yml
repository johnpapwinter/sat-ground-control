
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg18
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=space
      - POSTGRES_DB=space
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine3.22
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  grafana:
    image: grafana/grafana:12.3
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - timescaledb
    volumes:
      - grafana_data:/var/lib/grafana


volumes:
  timescaledb_data:
  redis_data:
  grafana_data:

